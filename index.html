<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter In Survival — Máy Chủ Minecraft Việt Nam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #007bff;
            --primary-dark: #0056b3;
            --bg-light: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Canvas Tuyết Rơi */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        /* NÚT TẢI MINECRAFT BẢN ĐẸP */
        .floating-download-btn {
            position: fixed;
            bottom: 90px; 
            right: 20px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: #ffffff !important;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.35);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .floating-download-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.5);
        }
        .floating-download-btn i { animation: bounceUpDown 1.5s infinite; }
        @keyframes bounceUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* NÚT LÊN ĐẦU TRANG */
        .back-to-top-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 45px;
            height: 45px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0; 
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .back-to-top-btn.show { opacity: 1; visibility: visible; }

        /* Navbar & Hero */
        .navbar { background-color: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(10px); }
        .hero-section { padding: 140px 0 80px 0; background: linear-gradient(135deg, #e6f0fa 0%, #f8f9fa 100%); }
        .hero-title { font-size: 3.5rem; font-weight: 800; background: linear-gradient(45deg, #0056b3, #00a2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Status & IP Box */
        .status-badge { background-color: #e2f5ea; color: #1f7a42; font-weight: 700; padding: 6px 16px; border-radius: 50px; }
        .status-dot { width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        .ip-box { background: var(--card-bg); border: 1px solid #dee2e6; border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .section-tag { color: var(--primary-color); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.85rem; display: block; margin-bottom: 0.5rem; }
        .section-title { font-weight: 800; font-size: 2.2rem; margin-bottom: 2.5rem; }
        
        .game-card { background: var(--card-bg); border: 1px solid #e9ecef; border-radius: 20px; padding: 30px; height: 100%; transition: all 0.3s; }
        .step-box { background: var(--card-bg); border: 1px solid #e9ecef; border-radius: 16px; padding: 25px; height: 100%; position: relative; }
        .step-number { font-size: 2.5rem; font-weight: 800; color: #e9ecef; position: absolute; top: 15px; right: 25px; }

        .youtube-wrapper { max-width: 850px; margin: 0 auto; position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); border: 1px solid #e9ecef; }
        .youtube-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        footer { background-color: #ffffff; border-top: 1px solid #e9ecef; padding: 40px 0; font-size: 0.95rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <a href="https://drive.google.com/file/d/1DKX9y0otfpJXPVY70gMIhTSzfGXabTd4/view?usp=drivesdk" target="_blank" class="floating-download-btn" id="downloadBtn">
        <i class="fa-solid fa-download"></i> Tải Minecraft v1.26.3
    </a>

    <button class="back-to-top-btn" id="backToTopBtn" title="Lên đầu trang"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- Header & Content -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-snowflake me-2"></i>WINTER IN SURVIVAL</a>
        </div>
    </nav>

    <section class="hero-section" id="home">
        <div class="container text-center text-lg-start">
            <h1 class="hero-title">Minecraft Server<br>Winter In Survival</h1>
        </div>
    </section>

    <section class="py-5 bg-white border-bottom" id="stat">
        <div class="container">
            <div class="row align-items-center g-4">
                <div class="col-md-4">
                    <span class="section-tag">// Games Status</span>
                    <h3>Trạng thái Server</h3>
                </div>
                <div class="col-md-4">
                    <div class="p-3 bg-light rounded-3 text-center border">
                        <span class="text-muted d-block small mb-1">Người chơi Online</span>
                        <h4 class="fw-bold text-dark mb-0" id="player-count">Đang tải...</h4>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Hàm cập nhật số người chơi (đã tích hợp logic mới 30 giây)
        async function updatePlayerCount() {
            const ip = "play.winterinsurvival.online";
            const port = "25191";
            const element = document.getElementById('player-count');
            
            try {
                const response = await fetch(`https://api.mcsrvstat.us/3/${ip}:${port}`);
                const data = await response.json();
                
                if (data.online) {
                    element.innerText = `${data.players.online} / ${data.players.max}`;
                } else {
                    element.innerText = "Offline";
                }
            } catch (error) {
                console.error("Lỗi:", error);
                element.innerText = "Đang tải...";
            }
        }

        // Gọi ngay khi tải trang và chạy lại mỗi 30 giây
        updatePlayerCount();
        setInterval(updatePlayerCount, 30000);

        // --- Các chức năng bổ trợ ---
        const backToTopBtn = document.getElementById("backToTopBtn");
        window.addEventListener("scroll", () => {
            if (window.pageYOffset > 400) backToTopBtn.classList.add("show");
            else backToTopBtn.classList.remove("show");
        });

        backToTopBtn.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        // Hiệu ứng tuyết rơi
        (function () {
            const canvas = document.getElementById("snow-canvas");
            const ctx = canvas.getContext("2d");
            let width = (canvas.width = window.innerWidth);
            let height = (canvas.height = window.innerHeight);
            const numFlakes = 60;
            const flakes = Array.from({ length: numFlakes }, () => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1,
                speedY: Math.random() * 1 + 0.5
            }));

            function draw() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                flakes.forEach(f => {
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    ctx.fill();
                    f.y += f.speedY;
                    if (f.y > height) f.y = -10;
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
