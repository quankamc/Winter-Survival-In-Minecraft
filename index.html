<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter In Survival</title>
    <meta name="keywords" content="Minecraft, Server Minecraft, Winter In Survival, Minecraft Survival, Server Minecraft Bedrock, Minecraft PE">
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="Winter In Survival">
    <link rel="canonical" href="https://winterinsurvival.online/"> <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://winterinsurvival.online/">
    <meta property="og:image" content="https://winterinsurvival.online/logo-game.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <h1 class="title">WINTER IN SURVIVAL</h1>
        <p class="subtitle">A PURE SURVIVAL EXPERIENCE IN MINECRAFT.</p>

        <div class="ip-box" onclick="copyIP()" title="Click to copy IP">
            <span class="ip-label">CLICK TO COPY IP</span>
            <div class="ip-address">play.winterinsurvival.online</div>
            
            <div id="status" class="online-status">Checking server status...</div>

            <div class="server-info">
                <span>Version: 1.26.x</span>                <span class="divider">|</span>
                <span>Port: 25567</span>
            </div>
        </div>

        <nav class="links">
            <a href="#">Discord</a>
            <a href="#">Store</a>
            <a href="#">Vote</a>
        </nav>
    </main>

    <footer class="footer">
        <p>&copy; <span id="year"></span> Winter In Survival. All rights reserved.</p>
        <p class="disclaimer">This server is a standalone server, not affiliated with Mojang AB.</p>
    </footer>

    <script>
        // Copy IP function
        function copyIP() {
            navigator.clipboard.writeText("play.winterinsurvival.online");
            alert("IP address copied to clipboard!");
        }

        // Auto-update year
        document.getElementById("year").textContent = new Date().getFullYear();

        // Server Status API
        async function updateStatus() {
            try {
                const response = await fetch("https://api.mcstatus.io/v2/status/bedrock/play.winterinsurvival.online:25567");
                const data = await response.json();
                const statusDiv = document.getElementById("status");
                
                if (data.online) {
                    statusDiv.innerHTML = `<span class="online-dot">●</span> ${data.players.online} / ${data.players.max} players online`;
                    statusDiv.style.color = "#4ade80";
                } else {
                    statusDiv.innerText = "Server is currently offline";
                    statusDiv.style.color = "#ef4444";
                }
            } catch (error) {
                document.getElementById("status").innerText = "Status unavailable";
            }
        }
        updateStatus();
    </script>
</body>
</html>
